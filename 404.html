<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Harshit Ranjan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/game_cover.png" type="image/png">
    <style>
        :root {
            --bg: rgb(25, 23, 36);
            --text: #e0def4;
            --muted: #908caa;
            --accent: #ea9a97;
            --gold: #f6c177;
            --border: #44415a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Urbanist', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .grain {
            position: fixed; inset: 0;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05; pointer-events: none; z-index: 1;
        }
        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(18,16,16,0) 50%, rgba(0,0,0,0.05) 50%);
            background-size: 100% 4px;
            opacity: 0.3; pointer-events: none; z-index: 1;
        }
        .center {
            text-align: center;
            position: relative; z-index: 2;
            padding: 40px 20px;
        }
        .code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: flicker 4s linear infinite;
        }
        @keyframes flicker {
            0%,19.999%,22%,62.999%,64%,64.999%,70%,100% { opacity:1; }
            20%,21.999%,63%,63.999%,65%,69.999% { opacity:0.85; }
        }
        .title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            margin: 12px 0 8px 0;
        }
        .sub {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 40px;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }
        .glitch-line {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: rgba(234,154,151,0.4);
            font-family: 'Courier New', monospace;
            margin-bottom: 40px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 32px;
            background: var(--text);
            color: var(--bg);
            font-family: 'Urbanist', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid var(--text);
            transition: all 0.25s;
            letter-spacing: 1px;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 var(--accent);
        }
        /* Floating artifacts */
        .artifacts {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
        }
        .art {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            opacity: 0.06;
            animation: floatArt 15s ease-in-out infinite;
        }
        @keyframes floatArt {
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-30px)}
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="scanlines"></div>
    <div class="artifacts" id="arts"></div>

    <div class="center">
        <div class="code">404</div>
        <div class="title">Page Not Found</div>
        <p class="sub">The level you're looking for doesn't exist. It may have been moved, deleted, or never spawned in the first place.</p>
        <div class="glitch-line">ERR_ASSET_NOT_LOADED :: HARSHIT.DEV/NULL</div>
        <a href="index.html" class="btn-home">← Back to Portfolio</a>
    </div>

    <script>
        const arts = document.getElementById('arts');
        const chars = ['X', 'Y', 'A', '▲', '■', '●', 'B'];
        const colors = ['#ebbcba','#31748f','#9ccfd8','#eb6f92','#f6c177','#c4a7e7'];
        for (let i = 0; i < 30; i++) {
            const el = document.createElement('div');
            el.className = 'art';
            el.textContent = chars[Math.floor(Math.random() * chars.length)];
            el.style.cssText = `top:${Math.random()*100}%;left:${Math.random()*100}%;color:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*-15}s;animation-duration:${12+Math.random()*8}s`;
            arts.appendChild(el);
        }
    </script>
</body>
</html>
